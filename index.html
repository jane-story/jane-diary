<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Registros — J.D.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Pinyon+Script&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --paper:      #f8f3e8;
  --paper-dark: #ede8d4;
  --paper-edge: #d8cdb0;
  --ink:        #1c1108;
  --ink-light:  #3a2516;
  --ink-fade:   #6b5035;
  --ink-faint:  #a88a60;
  --red-ink:    #8b1a1a;
  --line-blue:  rgba(100,130,200,0.13);
  --margin-red: rgba(190,50,35,0.25);
  --cover:      #2e1e14;
  --cover2:     #3d2a1c;
  --gold:       #b8943a;
  --gold-light: #d4af5a;
  --line-h:     32px; /* ruled line height */
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: #140e09;
  font-family: 'IM Fell English', Georgia, serif;
  color: var(--ink);
  overflow-x: hidden;
}

/* ── MAIN ── */
#mainSite { display: block; min-height: 100vh; animation: fadeUp 1s ease-out both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(12px);} to{opacity:1;transform:translateY(0);} }

/* ── CALENDAR VIEW ── */
#calendarView {
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 40px 16px 60px;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(60,35,15,.6) 0%, transparent 55%),
    radial-gradient(ellipse at 75% 80%, rgba(40,20,5,.7) 0%, transparent 55%),
    #140e09;
}

.notebook { width: min(440px, 94vw); position: relative; }
.notebook::after {
  content: ''; position: absolute; bottom: -18px; left: 5%; right: 5%;
  height: 22px;
  background: radial-gradient(ellipse, rgba(0,0,0,.55) 0%, transparent 70%);
  border-radius: 50%; filter: blur(5px);
}

.book-cover {
  background:
    repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(0,0,0,.04) 3px, rgba(0,0,0,.04) 4px),
    linear-gradient(160deg, #3d2a1c 0%, #2e1e14 40%, #241609 100%);
  border-radius: 3px 10px 10px 3px;
  box-shadow:
    -5px 0 0 #0f0905,
    -2px 0 6px rgba(0,0,0,.8),
    6px 6px 40px rgba(0,0,0,.7),
    12px 12px 60px rgba(0,0,0,.4),
    inset 2px 1px 8px rgba(255,200,100,.05);
  position: relative; overflow: hidden;
}
.book-spine {
  position: absolute; left: 0; top: 0; bottom: 0; width: 22px;
  background: linear-gradient(90deg, #0a0603, #1a0e08, #0f0805);
  box-shadow: inset -4px 0 8px rgba(0,0,0,.6);
}
.book-spine::after {
  content: 'J · D'; position: absolute; bottom: 28px; left: 50%;
  transform: translateX(-50%) rotate(-90deg);
  font-family: 'Pinyon Script', cursive; font-size: 11px;
  color: rgba(180,140,50,.45); white-space: nowrap; letter-spacing: .25em;
}
.corner { position: absolute; width: 22px; height: 22px; border-color: var(--gold); border-style: solid; opacity: .45; }
.corner.tl { top:12px; left:28px; border-width:2px 0 0 2px; }
.corner.tr { top:12px; right:12px; border-width:2px 2px 0 0; }
.corner.bl { bottom:12px; left:28px; border-width:0 0 2px 2px; }
.corner.br { bottom:12px; right:12px; border-width:0 2px 2px 0; }

.book-inner { padding: 22px 18px 22px 36px; }
.book-header {
  text-align: center; margin-bottom: 16px; padding-bottom: 12px;
  border-bottom: 1px solid rgba(180,140,50,.25); position: relative;
}
.book-header::after {
  content: '✦'; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
  background: var(--cover2); padding: 0 8px; color: var(--gold); font-size: 10px; opacity: .6;
}
.book-title {
  font-family: 'Pinyon Script', cursive; font-size: clamp(26px, 7vw, 36px);
  color: var(--gold-light); text-shadow: 0 2px 8px rgba(0,0,0,.5), 0 0 28px rgba(180,140,50,.18);
  line-height: 1.1; margin-bottom: 3px;
}
.book-sub {
  font-family: 'IM Fell English', serif; font-size: 9px;
  letter-spacing: .30em; color: rgba(180,140,50,.45); text-transform: uppercase;
}

.month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.month-nav button {
  background: none; border: none; color: rgba(180,140,50,.5);
  font-size: 22px; cursor: pointer; padding: 6px 12px;
  transition: color .2s; line-height: 1; -webkit-tap-highlight-color: transparent;
}
.month-nav button:hover, .month-nav button:active { color: var(--gold-light); }
.month-label {
  font-family: 'Pinyon Script', cursive; font-size: clamp(19px, 5vw, 24px);
  color: var(--gold-light); text-align: center; flex: 1;
  text-shadow: 0 1px 4px rgba(0,0,0,.4);
}
.cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 4px; }
.cal-weekday {
  text-align: center; font-size: 8px; letter-spacing: .15em;
  color: rgba(180,140,50,.38); text-transform: uppercase; padding: 3px 0;
}
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.cal-day {
  aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  font-family: 'IM Fell English', serif; font-size: clamp(11px, 2.5vw, 13px);
  color: rgba(200,170,100,.25); border-radius: 2px; position: relative;
  transition: all .15s; cursor: default; user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.cal-day.empty { pointer-events: none; }
.cal-day.has-entry {
  color: var(--gold-light); cursor: pointer;
  background: rgba(180,140,50,.07); border: 1px solid rgba(180,140,50,.18);
}
.cal-day.has-entry::after {
  content: '·'; position: absolute; bottom: 1px; left: 50%; transform: translateX(-50%);
  color: var(--gold); font-size: 14px; line-height: 1; opacity: .7;
}
.cal-day.has-entry:hover, .cal-day.has-entry:active {
  background: rgba(180,140,50,.16); border-color: rgba(180,140,50,.5);
  color: #fff8e0; transform: scale(1.1);
  box-shadow: 0 2px 14px rgba(180,140,50,.22);
}
.book-footer {
  margin-top: 14px; padding-top: 12px; border-top: 1px solid rgba(180,140,50,.15);
  text-align: center; font-size: 9px; letter-spacing: .35em;
  color: rgba(180,140,50,.26); text-transform: uppercase;
}
.rings {
  position: absolute; left: -8px; top: 0; bottom: 0; width: 16px;
  pointer-events: none;
  display: flex; flex-direction: column; justify-content: space-evenly; z-index: 5;
}
.ring {
  width: 16px; height: 16px; border: 2px solid #4a4a4a; border-radius: 50%;
  background: #1a0e08; box-shadow: 0 1px 3px rgba(0,0,0,.6), inset 0 1px 2px rgba(255,255,255,.04);
  flex-shrink: 0;
}

/* ── PAGE VIEW ── */
#pageView {
  min-height: 100vh; align-items: flex-start;
  justify-content: center; padding: 20px 0 80px;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(60,35,15,.6) 0%, transparent 55%),
    radial-gradient(ellipse at 75% 80%, rgba(40,20,5,.7) 0%, transparent 55%),
    #140e09;
}

.page-wrap { width: 100%; max-width: 680px; position: relative; }

.page-topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px 14px;
}
.back-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: none; border: none; cursor: pointer;
  font-family: 'IM Fell English', serif; font-size: 11px; letter-spacing: .20em;
  color: rgba(180,140,50,.5); text-transform: uppercase; padding: 0;
  transition: color .2s; -webkit-tap-highlight-color: transparent;
}
.back-btn:hover, .back-btn:active { color: var(--gold-light); }
.back-btn::before { content: '←'; font-size: 14px; }
.entry-counter {
  font-family: 'IM Fell English', serif; font-size: 10px;
  color: rgba(180,140,50,.35); letter-spacing: .18em; text-transform: uppercase;
}

.page-flip-scene { position: relative; perspective: 2400px; overflow: hidden; }

.page-stack::before, .page-stack::after {
  content: ''; position: absolute; inset: 0; border-radius: 1px 4px 4px 1px;
}
.page-stack::before { transform: rotate(.7deg) translate(4px, 3px); z-index: 0; background: #ede8d8; box-shadow: 1px 1px 6px rgba(0,0,0,.2); }
.page-stack::after  { transform: rotate(-.4deg) translate(2px, 1px); z-index: 1; background: #f0ead8; box-shadow: 1px 1px 5px rgba(0,0,0,.15); }

/* ── NOTEBOOK PAGE ── */
.notebook-page {
  position: relative; z-index: 2;
  background: var(--paper);
  border-radius: 1px 4px 4px 1px;
  box-shadow:
    -3px 0 0 #c0b598,
    2px 4px 22px rgba(0,0,0,.38),
    5px 8px 44px rgba(0,0,0,.22),
    inset 0 0 80px rgba(180,150,80,.05);
  padding: 48px 36px 72px 74px;
  min-height: 80vh;
  overflow: hidden;
  background-image:
    linear-gradient(90deg, transparent 62px, var(--margin-red) 62px, var(--margin-red) 64px, transparent 64px),
    repeating-linear-gradient(transparent, transparent calc(var(--line-h) - 1px), var(--line-blue) calc(var(--line-h) - 1px), var(--line-blue) var(--line-h));
  background-color: var(--paper);
  transform-origin: center center;
}

/* flip animations */
@keyframes pageFlipOut     { 0%{transform:perspective(2400px) rotateY(0) scale(1);}    100%{transform:perspective(2400px) rotateY(-90deg) scale(.96);} }
@keyframes pageFlipIn      { 0%{transform:perspective(2400px) rotateY(90deg) scale(.96);} 100%{transform:perspective(2400px) rotateY(0) scale(1);} }
@keyframes pageFlipOutBack { 0%{transform:perspective(2400px) rotateY(0) scale(1);}    100%{transform:perspective(2400px) rotateY(90deg) scale(.96);} }
@keyframes pageFlipInBack  { 0%{transform:perspective(2400px) rotateY(-90deg) scale(.96);}100%{transform:perspective(2400px) rotateY(0) scale(1);} }
.notebook-page.flip-out-fwd  { animation: pageFlipOut     .28s ease-in  forwards; }
.notebook-page.flip-in-fwd   { animation: pageFlipIn      .28s ease-out forwards; }
.notebook-page.flip-out-back { animation: pageFlipOutBack .28s ease-in  forwards; }
.notebook-page.flip-in-back  { animation: pageFlipInBack  .28s ease-out forwards; }

/* torn top */
.notebook-page::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px;
  background: var(--paper-edge);
  clip-path: polygon(0% 0%,1.5% 100%,3% 20%,5% 80%,7% 15%,10% 65%,13% 30%,16% 85%,19% 20%,22% 70%,25% 40%,28% 90%,31% 25%,34% 60%,37% 15%,40% 55%,43% 80%,46% 35%,49% 70%,52% 25%,55% 60%,58% 40%,61% 75%,64% 25%,67% 65%,70% 35%,73% 70%,76% 20%,79% 55%,82% 40%,85% 65%,88% 30%,91% 60%,94% 15%,97% 50%,100% 0%);
}

/* ── PAGE TEXT ── */
.page-text {
  font-family: 'Caveat', cursive;
  font-size: clamp(16px, 3.8vw, 20px);
  font-weight: 500;
  color: var(--ink);
  line-height: var(--line-h);
  position: relative; z-index: 1;
}

.page-date {
  font-family: 'Caveat', cursive; font-weight: 700;
  font-size: clamp(19px, 5vw, 25px);
  color: var(--ink); line-height: 1.3; margin-bottom: 2px;
}
.page-date-sub {
  font-family: 'IM Fell English', serif; font-style: italic;
  font-size: 11px; color: var(--ink-fade); letter-spacing: .1em;
  margin-bottom: 18px; border-bottom: 1px solid rgba(0,0,0,.07); padding-bottom: 6px;
}

.page-text p { margin-bottom: 0; min-height: calc(var(--line-h) * 0.55); }
.page-text p.blank { height: calc(var(--line-h) * 0.9); }

hr.page-divider {
  border: none; height: 1px; margin: 10px 0;
  background: linear-gradient(90deg, transparent, var(--ink-faint), transparent);
  opacity: .38; position: relative; z-index: 1;
}

/* ── INLINE TEXT STYLES (ref image) ── */
/* Strikethrough — whole line or inline */
.strike { text-decoration: line-through; opacity: .65; font-style: italic; }
/* Red bold italic — important/emphasis */
.red-bold { color: var(--red-ink); font-weight: 700; font-style: italic; }
/* Underline */
.underline { text-decoration: underline; text-underline-offset: 3px; }

/* Illustration */
.page-illustration { margin: 10px 0 4px; display: flex; justify-content: flex-end; position: relative; z-index: 1; }
.page-illustration.left  { justify-content: flex-start; }
.page-illustration.center { justify-content: center; }
.illustration-wrap { position: relative; display: inline-block; }
.illust-svg-wrap { max-width: 200px; opacity: 0; mix-blend-mode: multiply; filter: sepia(.25) contrast(.9) brightness(1.06); transition: opacity .9s ease; }
.illust-svg-wrap.loaded { opacity: .85; }
.illustration-caption { font-family: 'Caveat', cursive; font-size: 13px; color: var(--ink-fade); text-align: center; margin-top: 2px; font-style: italic; }
.illustration-loading {
  width: 140px; height: 90px; display: flex; align-items: center;
  justify-content: center; flex-direction: column; gap: 6px;
  border: 1px dashed var(--ink-faint); border-radius: 3px; opacity: .4;
}
.illustration-loading span { font-family: 'Caveat', cursive; font-size: 14px; color: var(--ink-fade); }
.loading-quill { font-size: 20px; animation: quillSway 1.6s ease-in-out infinite; display: inline-block; }
@keyframes quillSway { 0%,100%{transform:rotate(-9deg) translateY(0);} 50%{transform:rotate(5deg) translateY(-5px);} }

.wax-seal {
  position: absolute; bottom: 28px; left: 52px;
  width: 30px; height: 30px; border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #8b1a1a, #5a0d0d);
  box-shadow: 1px 2px 6px rgba(0,0,0,.3), inset 0 1px 3px rgba(255,255,255,.08);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Pinyon Script', cursive; font-size: 12px;
  color: rgba(255,220,180,.65); opacity: .5;
}
.page-number {
  position: absolute; bottom: 20px; right: 28px;
  font-family: 'Caveat', cursive; font-weight: 600;
  font-size: 15px; color: var(--ink-faint);
}

/* Page nav */
.page-nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 16px 0; }
.page-nav-btn {
  display: flex; align-items: center; gap: 6px;
  background: none; border: none; cursor: pointer;
  font-family: 'IM Fell English', serif; font-size: 11px; letter-spacing: .16em;
  color: rgba(180,140,50,.4); text-transform: uppercase;
  padding: 10px 14px; border-radius: 3px;
  transition: all .2s; -webkit-tap-highlight-color: transparent;
  min-width: 80px; min-height: 44px;
}
.page-nav-btn:hover, .page-nav-btn:active { color: var(--gold-light); background: rgba(180,140,50,.06); }
.page-nav-btn:disabled { opacity: 0; pointer-events: none; }
.page-nav-btn.prev::before { content: '‹'; font-size: 20px; }
.page-nav-btn.next::after  { content: '›'; font-size: 20px; }

/* ── MUTE BUTTON (only shown after music starts) ── */
#muteBtn {
  position: fixed; bottom: 18px; right: 18px; z-index: 200;
  background: rgba(20,14,9,.75); border: 1px solid rgba(180,140,50,.18);
  border-radius: 50%; width: 34px; height: 34px;
  display: none; align-items: center; justify-content: center;
  cursor: pointer; font-size: 14px; color: rgba(180,140,50,.5);
  transition: all .2s; backdrop-filter: blur(4px);
  -webkit-tap-highlight-color: transparent;
}
#muteBtn.show { display: flex; }
#muteBtn:hover { border-color: rgba(180,140,50,.5); color: var(--gold-light); }
#muteBtn.muted { opacity: .45; }

/* ── MOBILE PORTRAIT ── */
@media (max-width: 520px) {
  :root { --line-h: 30px; }
  .notebook-page {
    padding: 36px 14px 60px 56px;
    background-image:
      linear-gradient(90deg, transparent 46px, var(--margin-red) 46px, var(--margin-red) 48px, transparent 48px),
      repeating-linear-gradient(transparent, transparent calc(var(--line-h) - 1px), var(--line-blue) calc(var(--line-h) - 1px), var(--line-blue) var(--line-h));
    border-radius: 0 2px 2px 0;
  }
  .page-text { font-size: clamp(15px, 4.5vw, 18px); }
  .page-stack::before, .page-stack::after { display: none; }
  #pageView { padding: 10px 0 70px; }
  .page-wrap { max-width: 100%; }
  .page-topbar { padding: 0 10px 8px; }
}

/* ── MOBILE LANDSCAPE ── */
@media (orientation: landscape) and (max-height: 520px) {
  :root { --line-h: 28px; }
  #calendarView { flex-direction: row; gap: 24px; padding: 16px; min-height: 100vh; }
  .notebook { width: min(340px, 50vw); }
  #pageView { padding: 8px 0 20px; }
  .page-topbar { padding: 0 10px 6px; }
  .notebook-page {
    padding: 28px 14px 52px 52px;
    min-height: unset;
    background-image:
      linear-gradient(90deg, transparent 42px, var(--margin-red) 42px, var(--margin-red) 44px, transparent 44px),
      repeating-linear-gradient(transparent, transparent calc(var(--line-h) - 1px), var(--line-blue) calc(var(--line-h) - 1px), var(--line-blue) var(--line-h));
  }
  .page-text { font-size: clamp(13px, 2.2vh, 16px); }
  .page-date { font-size: clamp(15px, 2.8vh, 20px); }
  .page-date-sub { margin-bottom: 10px; }
  .page-stack::before, .page-stack::after { display: none; }
  .page-nav { padding: 8px 10px 0; }
}
</style>
</head>
<body>

<!-- BG MUSIC -->
<audio id="bgMusic"   src="jd-theme.mp3"   loop preload="auto"></audio>
<audio id="flipAudio" src="page-turn.mp3"  preload="auto"></audio>
<button id="muteBtn" title="Silenciar" aria-label="Silenciar música">♪</button>

<!-- MAIN SITE -->
<div id="mainSite">

  <!-- CALENDAR -->
  <div id="calendarView">
    <div class="notebook">
      <div class="rings">
        <div class="ring"></div><div class="ring"></div><div class="ring"></div>
        <div class="ring"></div><div class="ring"></div>
      </div>
      <div class="book-cover">
        <div class="book-spine"></div>
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
        <div class="book-inner">
          <div class="book-header">
            <div class="book-title">Registros Pessoais</div>
            <div class="book-sub">Jane Doe · Não Autorizado</div>
          </div>
          <div class="month-nav">
            <button id="prevMonth" aria-label="Mês anterior">‹</button>
            <div class="month-label" id="monthLabel"></div>
            <button id="nextMonth" aria-label="Próximo mês">›</button>
          </div>
          <div class="cal-weekdays">
            <div class="cal-weekday">Dom</div><div class="cal-weekday">Seg</div>
            <div class="cal-weekday">Ter</div><div class="cal-weekday">Qua</div>
            <div class="cal-weekday">Qui</div><div class="cal-weekday">Sex</div>
            <div class="cal-weekday">Sáb</div>
          </div>
          <div class="cal-grid" id="calGrid"></div>
          <div class="book-footer">os dias marcados guardam palavras</div>
        </div>
      </div>
    </div>
  </div>

  <!-- PAGE VIEW -->
  <div id="pageView">
    <div class="page-wrap">
      <div class="page-topbar">
        <button class="back-btn" id="backBtn">voltar ao caderno</button>
        <div class="entry-counter" id="entryCounter"></div>
      </div>
      <div class="page-flip-scene">
        <div class="page-stack">
          <div class="notebook-page" id="notebookPage"></div>
        </div>
      </div>
      <div class="page-nav">
        <button class="page-nav-btn prev" id="prevEntryBtn">anterior</button>
        <button class="page-nav-btn next" id="nextEntryBtn">próximo</button>
      </div>
    </div>
  </div>

</div>

<script>
/* ════════════════════════════════════════
   ENTRIES
   Markup inline suportado nos parágrafos:
     **texto**   → vermelho bold itálico
     ~~texto~~   → tachado (strikethrough)
     __texto__   → sublinhado
   Linhas especiais:
     "—"   → divisor horizontal
     ""    → linha em branco
════════════════════════════════════════ */
const ENTRIES = {
  "2031-07-25": {
    time: "por volta das 22h",
    paragraphs: [
      "Saí do ambiente de trabalho hoje.",
      "",
      "Não por necessidade.",
      "",
      "O deslocamento não tinha relação direta com o objetivo principal, mas a ausência de variáveis controladas pode ser útil em certos casos. A zona costeira apresentava condições adequadas. Baixa movimentação, ruído previsível, padrões repetitivos.",
      "",
      "Identifiquei um indivíduo em estado de indecisão.",
      "",
      "Ele estava parado diante de uma barraca, olhando para o mesmo ponto há tempo suficiente para caracterizar hesitação. A postura indicava intenção não executada. Não havia impedimento real, apenas processamento interno prolongado.",
      "",
      "Aproximei.",
      "",
      "Não houve resistência.",
      "",
      "Adquiri dois peixes.",
      "",
      "Entreguei um.",
      "",
      "A reação foi imediata, mas não na ação. Ele demorou para processar. A expressão mudou de neutra para surpresa e, em seguida, constrangimento. Desviou o olhar, evitou contato direto, apresentou sinais claros de desconforto com a situação.",
      "",
      "**Timidez.**",
      "",
      "**Baixa assertividade.**",
      "",
      "**Padrão previsível.**",
      "",

/* ════════════════════════════════════════
   SORTED ENTRIES
════════════════════════════════════════ */
function extractHour(t) {
  const m = (t||"").match(/(\d{1,2})[h:]/i);
  return m ? parseInt(m[1]) : 0;
}
function buildSorted() {
  const list = [];
  for (const [dk, val] of Object.entries(ENTRIES)) {
    const arr = Array.isArray(val) ? val : [val];
    arr.slice().sort((a,b) => extractHour(a.time) - extractHour(b.time))
       .forEach((entry, si) => list.push({ dateKey: dk, subIdx: si, entry }));
  }
  list.sort((a,b) => a.dateKey !== b.dateKey ? a.dateKey.localeCompare(b.dateKey) : a.subIdx - b.subIdx);
  return list;
}
const SORTED = buildSorted();

/* ════════════════════════════════════════
   FLIP SOUND — usa o MP3 real
════════════════════════════════════════ */
const flipAudio = document.getElementById('flipAudio');
function playFlip() {
  try {
    flipAudio.currentTime = 0;
    flipAudio.volume = 0.7;
    flipAudio.play().catch(() => {});
  } catch(e) {}
}

/* ════════════════════════════════════════
   MUSIC — tenta autoplay, cai pra 1ª interação
════════════════════════════════════════ */
const bgMusic = document.getElementById('bgMusic');
const muteBtn = document.getElementById('muteBtn');
let muted = false;

function startMusicFade() {
  bgMusic.volume = 0;
  return bgMusic.play().then(() => {
    muteBtn.classList.add('show');
    let v = 0;
    const t = setInterval(() => { v=Math.min(0.42,v+0.018); bgMusic.volume=v; if(v>=0.42)clearInterval(t); }, 100);
    return true;
  });
}

// Try autoplay on load; if blocked, start once on first interaction then never again
let _musicDone = false;
function initMusic() {
  if (_musicDone) return;
  _musicDone = true;
  startMusicFade().catch(() => { _musicDone = false; }); // reset only if truly failed
}
window.addEventListener('load', initMusic);
document.addEventListener('click',      () => initMusic(), { capture: true, passive: true });
document.addEventListener('touchstart', () => initMusic(), { capture: true, passive: true });

muteBtn.addEventListener('click', () => {
  muted = !muted;
  bgMusic.muted = muted;
  muteBtn.textContent = muted ? '♩' : '♪';
  muteBtn.classList.toggle('muted', muted);
});

/* ════════════════════════════════════════
   CALENDAR
════════════════════════════════════════ */
const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
let cY=2031, cM=6;

function renderCal() {
  document.getElementById('monthLabel').textContent = MONTHS[cM]+' de '+cY;
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  const first = new Date(cY,cM,1).getDay();
  const days  = new Date(cY,cM+1,0).getDate();
  for (let i=0;i<first;i++) { const e=document.createElement('div'); e.className='cal-day empty'; grid.appendChild(e); }
  for (let d=1;d<=days;d++) {
    const key  = cY+'-'+String(cM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const cell = document.createElement('div');
    cell.className = 'cal-day';
    cell.textContent = d;
    if (ENTRIES[key]) {
      cell.classList.add('has-entry');
      cell.addEventListener('click', () => { playFlip(); showEntry(key); });
    }
    grid.appendChild(cell);
  }
}
document.getElementById('prevMonth').addEventListener('click', () => { cM--; if(cM<0){cM=11;cY--;} renderCal(); });
document.getElementById('nextMonth').addEventListener('click', () => { cM++; if(cM>11){cM=0;cY++;} renderCal(); });

/* ════════════════════════════════════════
   INLINE MARKUP PARSER
════════════════════════════════════════ */
function parseInline(raw) {
  // escape HTML
  let s = raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // **bold red italic**
  s = s.replace(/\*\*(.+?)\*\*/g, '<span class="red-bold">$1</span>');
  // ~~strikethrough~~
  s = s.replace(/~~(.+?)~~/g, '<span class="strike">$1</span>');
  // __underline__
  s = s.replace(/__(.+?)__/g, '<span class="underline">$1</span>');
  return s;
}

/* ════════════════════════════════════════
   PAGE VIEW
════════════════════════════════════════ */
const calView = document.getElementById('calendarView');
const pgView  = document.getElementById('pageView');
const pgEl    = document.getElementById('notebookPage');
const prevBtn = document.getElementById('prevEntryBtn');
const nextBtn = document.getElementById('nextEntryBtn');
const counter = document.getElementById('entryCounter');

let curIdx = 0;
let locked = false;

function fmtDate(key) {
  const [y,m,d] = key.split('-');
  return parseInt(d)+' de '+MONTHS[parseInt(m)-1]+' de '+y;
}

function buildHTML(item) {
  const { dateKey, entry } = item;
  const mid = Math.floor(entry.paragraphs.length * 0.35);
  let h = `<div class="page-date">${fmtDate(dateKey)}</div>
<div class="page-date-sub">${parseInline(entry.time||'')} &nbsp;·&nbsp; Não Autorizado</div>`;
  entry.paragraphs.forEach((p, i) => {
    if (i===mid && entry.illustration) {
      const a = entry.illustration.align||'right';
      h += `<div class="page-illustration ${a}" id="illwrap-${dateKey}">
  <div class="illustration-wrap">
    <div class="illustration-loading" id="illload-${dateKey}">
      <span class="loading-quill">✒</span><span>desenhando…</span>
    </div>
  </div></div>`;
    }
    if (p==='—')     h += `<hr class="page-divider">`;
    else if (p==='') h += `<p class="blank"></p>`;
    else             h += `<p>${parseInline(p)}</p>`;
  });
  const day = parseInt(dateKey.split('-')[2]);
  h += `<div class="wax-seal">J</div><div class="page-number">${day}</div>`;
  return `<div class="page-text">${h}</div>`;
}

function updateNav() {
  prevBtn.disabled = curIdx <= 0;
  nextBtn.disabled = curIdx >= SORTED.length-1;
  counter.textContent = SORTED.length > 1 ? (curIdx+1)+' / '+SORTED.length : '';
}

async function goToIdx(idx, dir) {
  if (locked || idx<0 || idx>=SORTED.length) return;
  curIdx = idx;
  updateNav();
  const html = buildHTML(SORTED[idx]);
  if (dir) {
    locked = true;
    const out = dir==='fwd' ? 'flip-out-fwd' : 'flip-out-back';
    const inn = dir==='fwd' ? 'flip-in-fwd'  : 'flip-in-back';
    pgEl.classList.add(out);
    await new Promise(r => setTimeout(r, 260));
    pgEl.classList.remove(out);
    pgEl.innerHTML = html;
    pgEl.classList.add(inn);
    await new Promise(r => setTimeout(r, 280));
    pgEl.classList.remove(inn);
    locked = false;
  } else {
    pgEl.innerHTML = html;
  }
  window.scrollTo({ top:0, behavior:'instant' });
  const item = SORTED[idx];
  if (item.entry.illustration) genIllust(item.dateKey, item.entry.illustration);
}

function showEntry(key) {
  const idx = SORTED.findIndex(e => e.dateKey===key);
  if (idx<0) return;
  calView.style.display = 'none';
  pgView.style.display  = 'flex';
  goToIdx(idx, null);
}

prevBtn.addEventListener('click', () => { playFlip(); goToIdx(curIdx-1, 'back'); });
nextBtn.addEventListener('click', () => { playFlip(); goToIdx(curIdx+1, 'fwd'); });
document.getElementById('backBtn').addEventListener('click', () => {
  pgView.style.display  = 'none';
  calView.style.display = 'flex';
  window.scrollTo({ top:0, behavior:'instant' });
});

// Swipe
let swipeX = 0;
pgEl.addEventListener('touchstart', e => { swipeX = e.changedTouches[0].clientX; }, { passive:true });
pgEl.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - swipeX;
  if (Math.abs(dx)<50) return;
  goToIdx(dx<0 ? curIdx+1 : curIdx-1, dx<0?'fwd':'back');
}, { passive:true });

/* ════════════════════════════════════════
   ILLUSTRATION
════════════════════════════════════════ */
async function genIllust(key, illust) {
  const loadEl = document.getElementById('illload-'+key);
  if (!loadEl) return;
  try {
    const res  = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514', max_tokens:1000,
        messages:[{role:'user',content:`You are a diary illustration generator. Respond ONLY with a valid JSON object — no markdown fences, no explanation.

Create a small SVG (220x160px) in the style of a delicate hand-drawn watercolor and pencil sketch for a personal diary. Warm sepia, cream, pale brown tones. Soft pencil strokes, organic shapes, gentle watercolor washes. Intimate, quiet, slightly impressionistic.

Subject: "${illust.prompt}"

Respond ONLY with: {"svg":"<svg xmlns='http://www.w3.org/2000/svg' width='220' height='160'>...</svg>"}`}]
      })
    });
    const data = await res.json();
    const raw  = data?.content?.find(b=>b.type==='text')?.text||'';
    let svg='';
    try { svg=JSON.parse(raw.replace(/```json|```/g,'').trim()).svg||''; }
    catch { const m=raw.match(/<svg[\s\S]*?<\/svg>/i); if(m) svg=m[0]; }
    const el2 = document.getElementById('illload-'+key);
    if (!svg||!el2) { if(el2) el2.style.display='none'; return; }
    const wrap=el2.parentElement;
    const div=document.createElement('div'); div.className='illust-svg-wrap'; div.innerHTML=svg;
    wrap.replaceChild(div,el2);
    if (illust.caption) { const c=document.createElement('div'); c.className='illustration-caption'; c.textContent=illust.caption; wrap.appendChild(c); }
    requestAnimationFrame(()=>requestAnimationFrame(()=>div.classList.add('loaded')));
  } catch(e) { const el=document.getElementById('illload-'+key); if(el) el.style.display='none'; }
}

/* ════════════════════════════════════════
   INIT
════════════════════════════════════════ */
pgView.style.display = 'none';
renderCal();
</script>
